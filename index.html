<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO de base -->
    <title>Gromi — Développement psychomoteur de votre enfant 0–12 ans</title>
    <meta name="description" content="Gromi accompagne le développement psychomoteur de votre enfant de 0 à 12 ans. Bilan personnalisé, 1 activité par jour, 8 domaines suivis. Créée par une psychomotricienne D.E." />
    <meta name="keywords" content="développement psychomoteur enfant, activités enfant, psychomotricité, suivi développement bébé, app parentalité, motricité fine, tonus équilibre, coordination enfant" />
    <meta name="author" content="Club Ludique — Psychomotricienne D.E." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://gromi.fr" />
    <meta name="theme-color" content="#F5D8C4" />

    <!-- Open Graph (partage réseaux sociaux, WhatsApp...) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://gromi.fr" />
    <meta property="og:title" content="Gromi — Développement psychomoteur 0–12 ans" />
    <meta property="og:description" content="1 enfant sur 5 a des difficultés de développement. La plupart ne sont détectées qu'à l'école. Gromi vous aide à agir tôt — 10 minutes par jour." />
    <meta property="og:image" content="https://gromi.fr/og-image.png" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:site_name" content="Gromi" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Gromi — Développement psychomoteur 0–12 ans" />
    <meta name="twitter:description" content="1 enfant sur 5 a des difficultés de développement. Gromi vous aide à agir tôt — 10 minutes par jour." />
    <meta name="twitter:image" content="https://gromi.fr/og-image.png" />

    <!-- JSON-LD : Application mobile -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "MobileApplication",
      "name": "Gromi",
      "description": "Application de suivi du développement psychomoteur de l'enfant de 0 à 12 ans. Bilan personnalisé, activités quotidiennes, suivi de progression sur 8 domaines.",
      "url": "https://gromi.fr",
      "applicationCategory": "HealthApplication",
      "operatingSystem": "iOS, Android",
      "inLanguage": "fr",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR",
        "description": "Accès gratuit avec options premium"
      },
      "author": {
        "@type": "Person",
        "name": "Psychomotricienne D.E.",
        "description": "Psychomotricienne diplômée d'État, créatrice de Club Ludique (90 000 abonnés TikTok)"
      }
    }
    </script>

    <!-- JSON-LD : FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Mon enfant n'a aucun problème, Gromi est quand même utile ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolument. Gromi n'est pas pour les enfants en difficulté. C'est pour tous les enfants — comme le sport entretient un corps sain, la psychomotricité entretient un développement sain."
          }
        },
        {
          "@type": "Question",
          "name": "10 minutes par jour, ça suffit vraiment ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui. La régularité bat l'intensité. 10 min/jour d'activité ciblée font une vraie différence pour tous les enfants."
          }
        },
        {
          "@type": "Question",
          "name": "C'est adapté aux enfants de 6 à 12 ans ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui. Concentration, écriture, coordination, gestion des émotions — Gromi couvre de la naissance jusqu'à 12 ans avec des activités adaptées à chaque âge."
          }
        }
      ]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Quicksand', system-ui, sans-serif; background: #FDF8F2; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
